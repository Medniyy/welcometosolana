<style>
/* ===== Gate — V3 design alignment =====
   Overrides v2.css tokens for gate.html only. All other pages unaffected. */

:root {
  /* V3 background / surface */
  --bg:               #0d0f12;
  --surface:          #161a20;
  --surface-raised:   #1b2029;
  /* V3 borders */
  --outline:          rgba(255,255,255,.07);
  --outline-muted:    rgba(255,255,255,.05);
  /* V3 ink scale */
  --on-surface:       #ecedef;
  --on-surface-variant: #b6bbc4;
  --on-surface-dim:   #5f646d;
  /* V3 fonts */
  --font-body:        'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:        'JetBrains Mono', ui-monospace, monospace;
  /* V3 frost */
  --frost-1:          #cfeef6;
  --frost-2:          #93d2e8;
  --frost-3:          #6fb9d6;
  --frost-glow:       rgba(147,210,232,.20);
}

/* Dot grid — V3 tone (slightly cooler, softer) */
.dot-grid {
  background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* Ambient glow, like V3 hero */
.gate-body::before {
  content: '';
  position: fixed;
  top: -120px; right: -120px;
  width: 640px; height: 640px;
  background: radial-gradient(circle, rgba(147,210,232,.13), transparent 70%);
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
}

/* Title — V3 weight/tracking */
.gate-title {
  font-weight: 600;
  letter-spacing: -0.035em;
  color: var(--on-surface);
}

/* Subtitle — V3 frost italic gradient */
.gate-sub {
  font-weight: 300;
  font-size: clamp(1.1rem, 2.6vw, 1.9rem);
  letter-spacing: -0.01em;
  background: linear-gradient(90deg, #cfeef6 0%, #93d2e8 60%, #6fb9d6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-top: .9rem;
}

/* Cards — V3 surface + border language */
.arch-card {
  background: var(--surface);
  border-color: rgba(255,255,255,.10);
  border-radius: 18px;
}
@media (prefers-reduced-motion: no-preference) {
  .arch-card:hover {
    border-color: rgba(147,210,232,.35);
    box-shadow: 0 20px 56px rgba(0,0,0,.55),
                0 0 0 1px rgba(147,210,232,.14),
                0 0 60px -20px rgba(147,210,232,.18);
  }
}

/* Card label — V3 mono style */
.arch-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .1em;
  color: var(--on-surface-dim);
  padding: .7rem .5rem 1rem;
}
.arch-card:hover .arch-label { color: var(--frost-2); }

/* Overlay — V3 background */
#gate-overlay { background: var(--bg); }

.overlay-text {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .12em;
  color: var(--on-surface-dim);
}

/* Escape link — V3 mono style */
/* Bottom CTA block */
.gate-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .875rem;
  position: relative;
  z-index: 1;
}
.gate-cta-text {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--on-surface-dim);
  letter-spacing: .02em;
  text-align: center;
}
.gate-cta-btns {
  display: flex;
  gap: .625rem;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>
<body class="gate-body">

<div class="dot-grid" aria-hidden="true"></div>

<header class="gate-header">
  <h1 class="gate-title">Welcome to<br/>Solana</h1>
  <p class="gate-sub">Who are you here as?</p>
</header>

<main>
  <div class="card-fan" id="card-fan">

    <button class="arch-card" data-href="new-to-solana.html" data-persona="new-to-solana"
      data-img="Newtosolana.png"
      data-video="animatednewtosolana-alpha.webm"
      data-texts='["Mapping your route…","Collecting your first steps…","Almost ready…"]'
      aria-label="New to Solana">
      <div class="arch-media">
        <img src="Newtosolana.png" alt="" aria-hidden="true"/>
      </div>
      <span class="arch-label">New to Solana</span>
    </button>

    <button class="arch-card" data-href="creator.html" data-persona="creator"
      data-img="Creators%20%26%20Media_%E2%80%A8.png"
      data-texts='["Finding your tools…","Building your path…","Almost ready…"]'
      aria-label="Creator">
      <div class="arch-media">
        <img src="Creators%20%26%20Media_%E2%80%A8.png" alt="" aria-hidden="true"/>
      </div>
      <span class="arch-label">Creator</span>
    </button>

    <button class="arch-card" data-href="builder.html" data-persona="builder"
      data-img="Builders_%E2%80%A8.png"
      data-texts='["Loading your stack…","Finding your tools…","Almost ready…"]'
      aria-label="Builder">
      <div class="arch-media">
        <img src="Builders_%E2%80%A8.png" alt="" aria-hidden="true"/>
      </div>
      <span class="arch-label">Builder</span>
    </button>

    <button class="arch-card" data-href="pro.html" data-persona="pro"
      data-img="Pro%20and%20degens%20_.png"
      data-texts='["Assembling the deep stack…","Mapping your routes…","Almost ready…"]'
      aria-label="Pro">
      <div class="arch-media">
        <img src="Pro%20and%20degens%20_.png" alt="" aria-hidden="true"/>
      </div>
      <span class="arch-label">Pro</span>
    </button>

  </div>
</main>

<footer class="gate-cta">
  <p class="gate-cta-text">Just want to browse everything?</p>
  <div class="gate-cta-btns">
    <a href="ecosystem-new.html" class="placeholder-back">Explore the ecosystem →</a>
    <a href="https://t.me/+3prPanTSreIwMzMy" target="_blank" rel="noopener" class="placeholder-back" onclick="window._track('click_telegram',{from:'gate'})">Join Telegram ↗</a>
  </div>
</footer>

<div id="gate-overlay" role="status" aria-live="polite">
  <div class="overlay-char">
    <img id="overlay-char-img" src="" alt=""/>
    <video id="overlay-char-video" autoplay loop muted playsinline style="display:none;width:100%;height:100%;object-fit:contain"></video>
  </div>
  <p class="overlay-text" id="overlay-text"></p>
  <div class="overlay-dots" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
</div>

<script>
(function(){
  var overlay   = document.getElementById('gate-overlay');
  var oImg      = document.getElementById('overlay-char-img');
  var oVideo    = document.getElementById('overlay-char-video');
  var oText     = document.getElementById('overlay-text');
  var fan       = document.getElementById('card-fan');
  var busy      = false;

  function pickCard(card){
    if(busy) return;
    busy = true;

    var href    = card.dataset.href;
    var persona = card.dataset.persona;
    var img     = card.dataset.img;
    var video   = card.dataset.video;
    var texts   = JSON.parse(card.dataset.texts || '["Getting ready…"]');

    localStorage.setItem('wts_persona', persona);
    window._track('gate_path_select', { persona: persona });

    var rect = card.getBoundingClientRect();
    var cx   = rect.left + rect.width  / 2;
    var cy   = rect.top  + rect.height / 2;

    if(video){
      oVideo.src = video;
      oVideo.style.display = 'block';
      oImg.style.display = 'none';
      oVideo.play();
    } else {
      oImg.src = img;
      oImg.style.display = 'block';
      oVideo.style.display = 'none';
    }
    oText.textContent = texts[0];

    [].forEach.call(fan.querySelectorAll('.arch-card'), function(c){
      if(c !== card) c.classList.add('fading-out');
    });

    overlay.style.setProperty('--cx', cx + 'px');
    overlay.style.setProperty('--cy', cy + 'px');
    overlay.classList.add('is-active');

    var i = 0;
    var seq = setInterval(function(){
      i = (i + 1) % texts.length;
      oText.style.opacity = '0';
      setTimeout(function(){
        oText.textContent = texts[i];
        oText.style.opacity = '1';
      }, 260);
    }, 1100);

    setTimeout(function(){
      clearInterval(seq);
      window.location.href = href;
    }, 3400);
  }

  [].forEach.call(document.querySelectorAll('.arch-card'), function(card){
    card.addEventListener('click', function(){ pickCard(card); });
    card.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); pickCard(card); }
    });
  });
})();
</script>
</body>
